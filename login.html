<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – ReThread</title>
  <meta name="description" content="Sign in to ReThread to shop, sell, and manage your wallet."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="login">
<div class="bg-grain"></div>

<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="logo-text text-3xl inline-flex items-center gap-3 no-underline">
        <svg class="w-9 h-9 text-green-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        ReThread
      </a>
      <p class="text-gray-400 mt-2 text-sm">Sign in to your account</p>
    </div>

    <!-- Quick Role Select -->
    <div class="flex gap-3 mb-6">
      <button data-role="user" class="flex-1 card p-4 text-center cursor-pointer hover:border-green-300 transition group">
        <div class="w-10 h-10 mx-auto mb-2 rounded-xl bg-blue-50 flex items-center justify-center">
          <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
        <span class="text-xs font-semibold text-gray-400 group-hover:text-blue-500 transition">User</span>
      </button>
      <button data-role="brand" class="flex-1 card p-4 text-center cursor-pointer hover:border-green-300 transition group">
        <div class="w-10 h-10 mx-auto mb-2 rounded-xl bg-purple-50 flex items-center justify-center">
          <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        </div>
        <span class="text-xs font-semibold text-gray-400 group-hover:text-purple-500 transition">Brand</span>
      </button>
      <button data-role="admin" class="flex-1 card p-4 text-center cursor-pointer hover:border-green-300 transition group">
        <div class="w-10 h-10 mx-auto mb-2 rounded-xl bg-green-50 flex items-center justify-center">
          <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
        </div>
        <span class="text-xs font-semibold text-gray-400 group-hover:text-green-600 transition">Admin</span>
      </button>
    </div>

    <!-- Login Form -->
    <div class="card p-8">
      <form id="loginForm" class="space-y-5">
        <div>
          <label class="form-label" for="loginUser">Username</label>
          <input type="text" id="loginUser" class="form-input" placeholder="Enter username" required/>
        </div>
        <div>
          <label class="form-label" for="loginPass">Password</label>
          <input type="password" id="loginPass" class="form-input" placeholder="Enter password" required/>
        </div>
        <button type="submit" class="btn-gold w-full py-3 text-base">Sign In</button>
      </form>
      <div class="mt-6 p-4 rounded-2xl bg-gray-50 border border-gray-100">
        <p class="text-xs text-gray-400 font-semibold uppercase tracking-wider mb-2">Demo Credentials</p>
        <div class="space-y-1 text-xs text-gray-500">
          <p><span class="text-blue-500 font-medium">User:</span> user / user123</p>
          <p><span class="text-purple-500 font-medium">Brand:</span> brand / brand123</p>
          <p><span class="text-green-600 font-medium">Admin:</span> admin / admin123</p>
        </div>
      </div>
    </div>

    <p class="text-center text-gray-400 text-xs mt-6">
      <a href="index.html" class="hover:text-green-700 transition">← Back to Home</a>
    </p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
