<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – ReThread</title>
  <meta name="description" content="Admin panel to review, approve, and manage trade-in submissions."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="admin">
<div class="bg-grain"></div>

<!-- ═══ HEADER ═══ -->
<header class="site-header">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4">
    <a href="index.html" class="logo-text flex items-center gap-2 no-underline">
      <svg class="w-7 h-7 text-green-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      ReThread
    </a>
    <nav class="hidden md:flex items-center gap-6">
      <a href="index.html" class="nav-link">Home</a>
      <a href="shop.html" class="nav-link">Shop</a>
      <a href="sell.html" class="nav-link">Sell</a>
      <a href="admin.html" class="nav-link active">Admin</a>
    </nav>
    <div class="flex items-center gap-4">
      <div id="authArea" class="flex items-center gap-3"></div>
    </div>
  </div>
</header>

<!-- ═══ ADMIN DASHBOARD ═══ -->
<section class="max-w-6xl w-full mx-auto px-4 md:px-8 py-12 overflow-hidden">
  <div class="mb-10 fade-up">
    <div class="flex items-center gap-3 mb-1">
      <div class="w-10 h-10 rounded-2xl bg-green-50 flex items-center justify-center">
        <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
      </div>
      <div>
        <h1 class="section-title text-2xl">Admin <span class="gold">Dashboard</span></h1>
        <p class="text-gray-400 text-sm">Manage trade-in submissions and approvals</p>
      </div>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-12 fade-up">
    <div class="card p-6">
      <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Total</p>
      <p class="text-2xl font-bold text-gray-800 mt-1" id="statTotal">0</p>
    </div>
    <div class="card p-6">
      <p class="text-xs text-amber-600 uppercase tracking-wider font-semibold">Pending</p>
      <p class="text-2xl font-bold text-amber-500 mt-1" id="statPending">0</p>
    </div>
    <div class="card p-6">
      <p class="text-xs text-emerald-600 uppercase tracking-wider font-semibold">Approved</p>
      <p class="text-2xl font-bold text-emerald-500 mt-1" id="statApproved">0</p>
    </div>
    <div class="card p-6">
      <p class="text-xs text-red-500 uppercase tracking-wider font-semibold">Rejected</p>
      <p class="text-2xl font-bold text-red-400 mt-1" id="statRejected">0</p>
    </div>
  </div>

  <!-- Submissions List -->
  <div class="space-y-5" id="submissionsList"></div>
</section>

<!-- ═══ FOOTER ═══ -->
<footer class="site-footer py-10">
  <div class="max-w-7xl mx-auto px-6 text-center text-xs text-gray-400">
    © 2026 ReThread. All rights reserved.
  </div>
</footer>
<script src="script.js?v=3"></script>
</html>
