<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop – ReThread</title>
  <meta name="description" content="Browse premium fashion clothing at ReThread. Blazers, shirts, ethnic wear and more."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="shop">
<div class="bg-grain"></div>

<!-- ═══ HEADER ═══ -->
<header class="site-header">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4">
    <a href="index.html" class="logo-text flex items-center gap-2 no-underline">
      <svg class="w-7 h-7 text-green-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      ReThread
    </a>
    <nav class="hidden md:flex items-center gap-6">
      <a href="index.html" class="nav-link">Home</a>
      <a href="shop.html" class="nav-link active">Shop</a>
      <a href="sell.html" class="nav-link">Sell</a>
      <a href="checkout.html" class="nav-link">Cart</a>
    </nav>
    <div class="flex items-center gap-4">
      <div class="search-bar hidden sm:flex">
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input type="text" placeholder="Search fashion..."/>
      </div>
      <a href="checkout.html" class="relative text-gray-400 hover:text-green-700 transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        <span id="cartBadge" class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-green-600 text-white text-xs font-bold rounded-full items-center justify-center hidden">0</span>
      </a>
      <div id="authArea" class="flex items-center gap-3"></div>
    </div>
  </div>
</header>

<!-- ═══ PAGE HEADER ═══ -->
<section class="max-w-7xl mx-auto px-6 pt-12 pb-8">
  <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4">
    <div>
      <h1 class="section-title text-3xl">Shop <span class="gold">Collection</span></h1>
      <div class="section-divider"></div>
      <p class="text-gray-400 text-sm mt-3">Curated premium fashion, delivered to your doorstep.</p>
    </div>
    <!-- Filters -->
    <div class="flex flex-wrap gap-2">
      <button data-filter="All" class="px-5 py-2 rounded-full text-sm font-medium bg-green-700 text-white transition">All</button>
      <button data-filter="Shirts" class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition">Shirts</button>
      <button data-filter="Blazers" class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition">Blazers</button>
      <button data-filter="Trousers" class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition">Trousers</button>
      <button data-filter="Jackets" class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition">Jackets</button>
      <button data-filter="Ethnic" class="px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition">Ethnic</button>
    </div>
  </div>
</section>

<!-- ═══ PRODUCT GRID ═══ -->
<section class="max-w-7xl mx-auto px-6 pb-24">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="productGrid"></div>
</section>

<!-- ═══ FOOTER ═══ -->
<footer class="site-footer py-10">
  <div class="max-w-7xl mx-auto px-6 text-center text-xs text-gray-400">
    © 2026 ReThread. All rights reserved.
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
