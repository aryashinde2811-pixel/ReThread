<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – ReThread</title>
  <meta name="description" content="Create an account on ReThread to shop, sell, and manage your wallet."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="register">
<div class="bg-grain"></div>

<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="logo-text text-3xl inline-flex items-center gap-3 no-underline">
        <svg class="w-9 h-9 text-green-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        ReThread
      </a>
      <p class="text-gray-400 mt-2 text-sm">Create your new account</p>
    </div>

    <!-- Register Form -->
    <div class="card p-8">
      <form id="registerForm" class="space-y-5">
        <div>
          <label class="form-label" for="regUser">Username</label>
          <input type="text" id="regUser" class="form-input" placeholder="Choose a username" required/>
        </div>
        <div>
          <label class="form-label" for="regPass">Password</label>
          <input type="password" id="regPass" class="form-input" placeholder="Create a password" required minlength="4"/>
        </div>
        <div>
          <label class="form-label" for="regRole">Role</label>
          <select id="regRole" class="form-input" required>
            <option value="user">User (Shopper/Seller)</option>
            <option value="brand">Brand Partner</option>
          </select>
        </div>
        <button type="submit" id="regBtn" class="btn-gold w-full py-3 text-base mt-2">Register</button>
      </form>
    </div>

    <p class="text-center text-gray-500 text-sm mt-6">
      Already have an account? <a href="login.html" class="text-green-700 font-semibold hover:underline">Sign In here</a>
    </p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
